name: Build and Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv cache clean
        uv sync --all-extras --dev
    
    - name: Run tests
      run: |
        uv run pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest
    # Only publish on tags, not every push
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read  # Read-only for tagged releases
    
    environment:
      name: pypi
      url: https://pypi.org/p/macbook-ai
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    
    - name: Verify version matches tag
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        TOML_VERSION=$(grep -m 1 'version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
          echo "Error: Tag version ($TAG_VERSION) doesn't match pyproject.toml version ($TOML_VERSION)"
          exit 1
        fi
        echo "Version verified: $TOML_VERSION"
    
    - name: Build package
      run: |
        uv build
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
